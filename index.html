<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تشكيلة فريق كرة القدم</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js "></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 30px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .player-inputs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .player-inputs div {
      background-color: #ecf0f1;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #219150;
    }

    .pitch {
      width: 600px;
      height: 400px;
      background: linear-gradient(to bottom, #2ecc71, #27ae60);
      position: relative;
      margin: 30px auto;
      border: 3px solid #fff;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .player {
      position: absolute;
      color: white;
      text-align: center;
      font-size: 14px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 8px 10px;
      border-radius: 50px;
      white-space: pre-line;
      text-shadow: 1px 1px 2px black;
    }

/* General styles for header and footer text containers on the pitch */
#matchHeader div,
#matchFooter div {
  color: white; /* Text color */
  font-size: 16px; /* Font size */
  font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7); /* Soft shadow for text */
  padding: 5px 10px; /* Padding within each display element */
  background-color: rgba(0, 0, 0, 0.4); /* Semi-transparent background */
  border-radius: 5px; /* Rounded corners for the background */
  flex-basis: 30%; /* Distribute space, adjust as needed */
}

/* Specific alignment for center elements to prevent them from taking full flex-basis width */
#matchHeader #displayMatchTitle,
#matchFooter #displaySeason {
  flex-grow: 1; /* Allow them to take necessary space */
  flex-basis: auto; /* Auto basis for content size */
  text-align: center;
}

#matchHeader #displayTeam1Name {
  text-align: left;
}
#matchHeader #displayTeam2Name {
  text-align: right;
}

#matchFooter #displayCompetition {
  text-align: left;
}
#matchFooter #displayScore {
  text-align: right;
}

/* Ensure the main containers for header and footer don't have the card background themselves, only the items */
#matchHeader, #matchFooter {
 /* No background here, it's on the child divs */
}

#playerDisplayArea {
  width: 100%;
  height: 100%;
  position: relative; /* Ensures it occupies space and can be a reference if needed */
}
  </style>
</head>
<body>

<div class="container">
  <h1>أنشئ تشكيلتك الكروية</h1>

  <label for="tactic">اختر التكتيك:</label>
  <select id="tactic" onchange="generateInputs()">
    <option value="4-3-3">4-3-3</option>
    <option value="4-4-2">4-4-2</option>
    <option value="4-2-3-1">4-2-3-1</option>
    <option value="3-5-2">3-5-2</option>
    <option value="5-4-1">5-4-1</option>
    <option value="3-4-3">3-4-3</option>
    <option value="4-1-4-1">4-1-4-1</option>
    <option value="4-5-1">4-5-1</option>
    <option value="3-4-1-2">3-4-1-2</option>
    <option value="4-1-2-1-2">4-1-2-1-2</option>
  </select>

<label for="team1Name">Team 1 Name:</label>
<input type="text" id="team1Name" placeholder="Enter Team 1 Name">

<label for="team2Name">Team 2 Name:</label>
<input type="text" id="team2Name" placeholder="Enter Team 2 Name">

<label for="matchTitle">Match Title:</label>
<input type="text" id="matchTitle" value="vs">

<label for="competitionName">Competition:</label>
<input type="text" id="competitionName" placeholder="e.g., Champions League">

<label for="season">Season:</label>
<input type="text" id="season" placeholder="e.g., 2024/25">

<label for="finalScore">Final Score:</label>
<input type="text" id="finalScore" placeholder="e.g., 2 - 1">

  <div class="player-inputs" id="playerInputs"></div>

  <div style="text-align:center;">
    <button onclick="generateFormation()">عرض التشكيلة</button>
    <button onclick="downloadImage()">تنزيل الصورة</button>
  </div>

  <div id="footballPitch" class="pitch">
<div id="matchHeader" style="position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;">
  <div id="displayTeam1Name" style="text-align: left;"></div>
  <div id="displayMatchTitle" style="text-align: center;">vs</div>
  <div id="displayTeam2Name" style="text-align: right;"></div>
</div>

<div id="playerDisplayArea"></div>

<div id="matchFooter" style="position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;">
  <div id="displayCompetition" style="text-align: left;"></div>
  <div id="displaySeason" style="text-align: center;"></div>
  <div id="displayScore" style="text-align: right;"></div>
</div>
</div>
</div>

  let currentPositions = [];

  function generateInputs() {
    const tactic = document.getElementById("tactic").value;
    const inputsDiv = document.getElementById("playerInputs");
    inputsDiv.innerHTML = "";
    currentPositions = JSON.parse(JSON.stringify(positionsByTactic[tactic]));

    currentPositions.forEach((p, i) => {
      const div = document.createElement("div");
      div.innerHTML = `
        <label>${p.pos}</label>
        <input type="text" placeholder="اسم اللاعب" oninput="updatePlayer(${i}, this.value)">
      `;
      inputsDiv.appendChild(div);
    });
  }

  function updatePlayer(index, name) {
    currentPositions[index].name = name;
  }

  function generateFormation() {
    const playerArea = document.getElementById("playerDisplayArea");
    if (!playerArea) {
      console.error("playerDisplayArea not found!");
      return;
    }
    playerArea.innerHTML = ""; // Clear only the player area

    const footballPitch = document.getElementById("footballPitch"); // Still needed for correct player positioning context

    currentPositions.forEach(p => {
      const el = document.createElement("div");
      el.className = "player";
      // Player positions are relative to footballPitch, which is position:relative
      el.style.left = p.x + "px";
      el.style.top = p.y + "px";
      el.innerText = `${p.name}\n${p.pos}`;
      playerArea.appendChild(el); // Append to playerArea
    });
  }

  function downloadImage() {
    html2canvas(document.getElementById("footballPitch")).then(canvas => {
      const link = document.createElement("a");
      link.download = "تشكيلة_الفريق.png";
      link.href = canvas.toDataURL();
      link.click();
    });
  }

  // Get input elements
  const team1NameInput = document.getElementById('team1Name');
  const team2NameInput = document.getElementById('team2Name');
  const matchTitleInput = document.getElementById('matchTitle');
  const competitionNameInput = document.getElementById('competitionName');
  const seasonInput = document.getElementById('season');
  const finalScoreInput = document.getElementById('finalScore');

  // Get display elements
  const displayTeam1Name = document.getElementById('displayTeam1Name');
  const displayTeam2Name = document.getElementById('displayTeam2Name');
  const displayMatchTitle = document.getElementById('displayMatchTitle');
  const displayCompetition = document.getElementById('displayCompetition');
  const displaySeason = document.getElementById('displaySeason');
  const displayScore = document.getElementById('displayScore');

  // Function to update display elements
  function updatePitchDisplays() {
    if (displayTeam1Name) displayTeam1Name.innerText = team1NameInput.value;
    if (displayTeam2Name) displayTeam2Name.innerText = team2NameInput.value;
    if (displayMatchTitle) displayMatchTitle.innerText = matchTitleInput.value || 'vs'; // Default to 'vs' if empty
    if (displayCompetition) displayCompetition.innerText = competitionNameInput.value;
    if (displaySeason) displaySeason.innerText = seasonInput.value;
    if (displayScore) displayScore.innerText = finalScoreInput.value;
  }

  if (team2NameInput) team2NameInput.addEventListener('input', updatePitchDisplays);

  if (competitionNameInput) competitionNameInput.addEventListener('input', updatePitchDisplays);
  if (seasonInput) seasonInput.addEventListener('input', updatePitchDisplays);
  if (finalScoreInput) finalScoreInput.addEventListener('input', updatePitchDisplays);

    updatePitchDisplays(); // Update displays with initial values (e.g. "vs" for match title)

</html>
